<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI v3.0 - Active Mic</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #00f2ff; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #interface { 
            position: relative; z-index: 10; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; padding: 40px; pointer-events: none;
        }
        #status { letter-spacing: 3px; font-size: 14px; text-shadow: 0 0 10px #00f2ff; font-weight: bold; }
        #response-box { 
            background: rgba(0, 15, 25, 0.8); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 25px; border: 1px solid #00f2ff55;
            max-width: 600px; text-align: center; pointer-events: auto;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        button { 
            background: #00f2ff; border: none; padding: 15px 40px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #fff; }
        .mic-dot { width: 20px; height: 20px; background: #ff0055; border-radius: 50%; margin: 15px auto; box-shadow: 0 0 20px #ff0055; transition: 0.3s; }
        #debug { position: absolute; bottom: 10px; left: 10px; font-size: 10px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="auraCanvas"></canvas>
    
    <div id="interface">
        <div style="text-align: center;">
            <div id="status">СИСТЕМА В ОЖИДАНИИ</div>
            <div id="mic" class="mic-dot"></div>
        </div>

        <div id="response-box">
            <div id="ai-text">Нажмите кнопку ниже, чтобы АУРА начала вас слышать</div>
            <button id="startBtn" onclick="activateSystem()">ВКЛЮЧИТЬ МИКРОФОН</button>
        </div>
        <div id="debug">STABLE BUILD 3.0 | SPEECH READY</div>
    </div>

    <script>
        // API KALITINGIZNI SHU YERGA QO'YING
        const API_KEY = "AIzaSyAZIgAv--qkmzCtcPLNHaAlg6PFXEov6dc"; 
        
        const canvas = document.getElementById('auraCanvas');
        const ctx = canvas.getContext('2d');
        let points = [], width, height, isSpeaking = false, micVol = 0;
        let recognition;

        // 1. GRAFIKA (Sfera doimo aylanishi uchun)
        function initGraphics() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            points = [];
            for(let i=0; i<800; i++) {
                let t = Math.random()*Math.PI*2;
                let p = Math.acos((Math.random()*2)-1);
                points.push({ sx: Math.sin(p)*Math.cos(t), sy: Math.sin(p)*Math.sin(t), sz: Math.cos(p), x: 0, y: 0 });
            }
        }

        function render() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            let time = Date.now() * 0.0008;
            let r = Math.min(width, height) * 0.3;

            ctx.save();
            ctx.translate(width/2, height/2);
            points.forEach((p) => {
                let rx = p.sx * Math.cos(time) - p.sz * Math.sin(time);
                let rz = p.sx * Math.sin(time) + p.sz * Math.cos(time);
                let ry = p.sy * Math.cos(time * 0.5) - rz * Math.sin(time * 0.5);
                
                p.x = rx * r * (1 + micVol/60);
                p.y = ry * r;

                ctx.fillStyle = isSpeaking ? '#ffffff' : '#00f2ff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.3, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.restore();
            requestAnimationFrame(render);
        }

        // 2. MIKROFON VA SPEECH AKTIVATSIYASI
        async function activateSystem() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "ПОИСК ГОЛОСА...";
            document.getElementById('ai-text').innerText = "Говорите: 'Аура' или 'Привет'";
            
            try {
                // Audio Context va Mikrofon tahlili
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 64;
                source.connect(analyzer);
                
                const data = new Uint8Array(analyzer.frequencyBinCount);

                // Sferani ovozga qarab titratish
                setInterval(() => {
                    analyzer.getByteFrequencyData(data);
                    let sum = 0;
                    for(let i=0; i<data.length; i++) sum += data[i];
                    micVol = sum / data.length;
                    
                    document.getElementById('mic').style.transform = `scale(${1 + micVol/12})`;
                    document.getElementById('mic').style.background = micVol > 8 ? "#00f2ff" : "#ff0055";
                    document.getElementById('mic').style.boxShadow = micVol > 8 ? "0 0 20px #00f2ff" : "0 0 10px #ff0055";
                }, 50);

                setupSpeechRecognition();
                
                // Birinchi marta ishlaganini bildirish uchun kichik ovoz
                speak("Слушаю вас");

            } catch(e) {
                console.error(e);
                alert("Микрофон не найден или доступ запрещен!");
                document.getElementById('startBtn').style.display = 'block';
            }
        }

        // 3. RUSCHA NUTQNI TANISH (STT)
        function setupSpeechRecognition() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                alert("Ваш браузер не поддерживает распознавание речи.");
                return;
            }

            recognition = new Speech();
            recognition.lang = 'ru-RU';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = async (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('ai-text').innerText = transcript;
                
                console.log("Eshitildi:", transcript);

                // Wake-word: "Аура" yoki "Привет"
                if (transcript.includes("аура") || transcript.includes("привет") || transcript.includes("aura")) {
                    processWithGemini(transcript);
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                if(event.error === 'not-allowed') alert("Доступ к микрофону заблокирован!");
            };

            recognition.onend = () => recognition.start(); // Doimo eshitib turish
            recognition.start();
        }

        // 4. GEMINI API BILAN BOG'LANISH
        async function processWithGemini(text) {
            document.getElementById('status').innerText = "ДУМАЮ...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Ты - АУРА. Отвечай кратко на русском языке. Вопрос пользователя: ${text}` }] }]
                    })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                speak(aiResponse);
            } catch (error) {
                console.error(error);
                speak("Ошибка соединения с сервером.");
            }
        }

        // 5. RUSCHA OVOZDA JAVOB BERISH (TTS)
        function speak(text) {
            window.speechSynthesis.cancel(); // Eski ovozni to'xtatish
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ru-RU';
            utter.pitch = 1.0;
            utter.rate = 1.0;

            utter.onstart = () => { 
                isSpeaking = true; 
                document.getElementById('status').innerText = "АУРА ГОВОРИТ";
                document.getElementById('ai-text').innerText = text;
            };
            utter.onend = () => { 
                isSpeaking = false; 
                document.getElementById('status').innerText = "АУРА СЛУШАЕТ";
            };
            window.speechSynthesis.speak(utter);
        }

        // Ishga tushirish
        initGraphics();
        render();
        window.addEventListener('resize', initGraphics);
    </script>
</body>
</html>
